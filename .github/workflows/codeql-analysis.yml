name: "CodeQL u-boot custom queries"

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: 'c-cpp'
        build-mode: 'manual'
        queries: ./.github/codeql/

    - name: Run manual build steps
      shell: bash
      run: |
        # Install dependencies
        sudo apt-get update
        sudo apt-get install -y build-essential bc bison flex libssl-dev make
        
        # Configure U-Boot
        make sandbox_defconfig
        
        # Build U-Boot with -fcommon to fix the yylloc GCC 10+ compiler error
        make HOSTCFLAGS="-fcommon" -j$(nproc)

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:c-cpp"
